<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PostDeck</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app-shell">
  <nav id="sidebar">
    <div class="brand">POSTDECK</div>

    <div class="nav-group" data-group="plan">
      <button type="button" class="nav-group-header" data-group-toggle="plan" aria-expanded="true">
        <span class="nav-group-label">Plan</span>
        <svg class="nav-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="nav-group-links">
        <a href="#/home" data-route="home" title="Home"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span class="nav-label">Home</span></a>
        <a href="#/calendar" data-route="calendar" title="Calendar / Queue"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg><span class="nav-label">Calendar / Queue</span></a>
        <a href="#/review" data-route="review" title="Review drafts"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span class="nav-label">Review</span></a>
        <a href="#/ideas" data-route="ideas" title="Ideas Board"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18h6M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.3 1 2.5h6c0-1.2.3-1.8 1-2.5A6 6 0 0 0 12 3z"/></svg><span class="nav-label">Ideas Board</span></a>
      </div>
    </div>

    <div class="nav-group" data-group="create">
      <button type="button" class="nav-group-header" data-group-toggle="create" aria-expanded="true">
        <span class="nav-group-label">Create</span>
        <svg class="nav-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="nav-group-links">
        <a href="#/composer" data-route="composer" title="Composer"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg><span class="nav-label">Composer</span></a>
        <a href="#/library" data-route="library" title="Library"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="15" rx="2"/><path d="M3 16l5-4 4 3 3-2 6 5"/><circle cx="8.5" cy="9" r="1.5"/></svg><span class="nav-label">Library</span></a>
        <a href="#/images" data-route="images" title="Images"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="15" rx="2"/><circle cx="8.5" cy="9.5" r="1.7"/><path d="M21 15l-5-4-8 6.5"/></svg><span class="nav-label">Images</span></a>
      </div>
    </div>

    <div class="nav-group" data-group="grow">
      <button type="button" class="nav-group-header" data-group-toggle="grow" aria-expanded="true">
        <span class="nav-group-label">Grow</span>
        <svg class="nav-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="nav-group-links">
        <a href="#/analytics" data-route="analytics" title="Analytics"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/></svg><span class="nav-label">Analytics</span></a>
        <a href="#/research" data-route="research" title="Research"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><span class="nav-label">Research</span></a>
        <a href="#/inspiration" data-route="inspiration" title="Inspiration"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l1.9 4.7L19 9.5l-4 3.4 1.2 5.1L12 15.6 7.8 18l1.2-5.1-4-3.4 5.1-1.8z"/></svg><span class="nav-label">Inspiration</span></a>
      </div>
    </div>

    <div class="nav-group" data-group="setup">
      <button type="button" class="nav-group-header" data-group-toggle="setup" aria-expanded="true">
        <span class="nav-group-label">Setup</span>
        <svg class="nav-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="nav-group-links">
        <a href="#/profiles" data-route="profiles" title="Profiles"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M6 15.6c.5-1.6 1.8-2.4 2.5-2.4s2 .8 2.5 2.4"/><path d="M14 10h4M14 13.5h4"/></svg><span class="nav-label">Profiles</span></a>
        <a href="#/settings" data-route="settings" title="Settings"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .34 1.87l.06.06a2.06 2.06 0 1 1-2.92 2.92l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V19.6a2.06 2.06 0 1 1-4.12 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2.06 2.06 0 1 1-2.92-2.92l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H4.4a2.06 2.06 0 1 1 0-4.12h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2.06 2.06 0 1 1 2.92-2.92l.06.06a1.7 1.7 0 0 0 1.87.34H10.5a1.7 1.7 0 0 0 1.03-1.56V4.4a2.06 2.06 0 1 1 4.12 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2.06 2.06 0 1 1 2.92 2.92l-.06.06a1.7 1.7 0 0 0-.34 1.87V10.5a1.7 1.7 0 0 0 1.56 1.03h.09a2.06 2.06 0 1 1 0 4.12h-.09a1.7 1.7 0 0 0-1.56 1.03z"/></svg><span class="nav-label">Settings</span></a>
        <a href="#/ops" data-route="ops" title="Ops Stats"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg><span class="nav-label">Ops Stats</span></a>
      </div>
    </div>

    <button type="button" id="sync-status-pill" class="sync-status-pill" aria-expanded="false" title="Sync status">
      <span id="sync-status-dot" class="sync-status-dot"></span>
      <span id="sync-status-label">Loading…</span>
    </button>
    <div id="sync-status-popover" class="sync-status-popover" hidden aria-hidden="true">
      <div id="sync-status-body" class="sync-status-body">
        <p style="color:var(--muted);font-size:12px;">Loading…</p>
      </div>
      <button type="button" id="sync-status-sync-now" class="button secondary sm">Sync now</button>
    </div>

    <button type="button" id="nav-shortcuts-hint" class="nav-shortcuts-hint" title="Keyboard shortcuts (? or click)">
      <span class="nav-shortcuts-hint-key">?</span> shortcuts
    </button>
  </nav>
  <main id="view"></main>
</div>

<!-- B10: FAB + chat drawer live outside #view on purpose - router() only ever
     swaps the #view node, so anything here persists across every navigation. -->
<button id="chat-toggle" class="chat-toggle-btn" aria-label="Ask PostDeck" aria-expanded="false" title="Ask PostDeck">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<button id="fab-new-post" class="fab" aria-label="New post" title="New post">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- B12: quick-stats action-center button + popover, third corner button
     stacked above the FAB and the chat toggle - a shell sibling like them,
     wired once in wireGlobalChrome() so it appears on every view. -->
<button id="action-center-toggle" class="action-center-btn" aria-label="Quick stats" aria-expanded="false" title="Quick stats">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 17l5-6 4 4 5-7 4 5"/><circle cx="3" cy="17" r="1.4" fill="currentColor" stroke="none"/><circle cx="8" cy="11" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="15" r="1.4" fill="currentColor" stroke="none"/><circle cx="17" cy="8" r="1.4" fill="currentColor" stroke="none"/><circle cx="21" cy="13" r="1.4" fill="currentColor" stroke="none"/></svg>
</button>

<div id="action-center-popover" class="action-center-popover" hidden aria-hidden="true">
  <div class="action-center-header">
    <span>Quick stats</span>
    <button id="action-center-close" class="chat-close" aria-label="Close quick stats">&times;</button>
  </div>
  <div id="action-center-body" class="action-center-body">
    <p style="color:var(--muted);font-size:12px;">Loading…</p>
  </div>
  <div class="action-center-links">
    <a href="#/ops">Open Ops &rarr;</a>
    <a href="#/analytics">Open Analytics &rarr;</a>
  </div>
</div>

<div id="chat-drawer" class="chat-drawer" hidden aria-hidden="true">
  <div class="chat-drawer-header">
    <span>Ask PostDeck</span>
    <button id="chat-close" class="chat-close" aria-label="Close chat">&times;</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-row">
    <textarea id="chat-input" rows="1" placeholder="Ask PostDeck to draft, edit, or find something…"></textarea>
    <button id="chat-send" class="primary chat-send">Send</button>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
